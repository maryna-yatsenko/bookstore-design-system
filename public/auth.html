  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      min-height: 100vh; background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      background: white; border: 1px solid #dadadc; border-radius: 16px;

    input {
      width: 100%; padding: 12px 16px; border: 1px solid #dadadc;
      border-radius: 8px; font-size: 14px; outline: none;
      transition: border-color 0.15s; color: #0a0a0a;
    }
    input:focus { border-color: #FAB304; }
    button {
      width: 100%; margin-top: 12px; padding: 12px;
      background: #FAB304; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; color: #0a0a0a;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #e5a200; }
    .error { color: #e50003; font-size: 13px; margin-top: 12px; display: none; }
  </style>

    <h1>BookStore Design System</h1>
    <p>Enter the password to access</p>
    <input type="password" id="pwd" placeholder="Password" onkeydown="if(event.key==='Enter')check()" autofocus />
    <button onclick="check()">Enter</button>
    <div class="error" id="err">Incorrect password. Try again.</div>
  </div>
  <script>
    const HASH = '__DS_PASSWORD_HASH__';
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    async function check() {
      const val = document.getElementById('pwd').value;
      const hash = await sha256(val);
      if (hash === HASH) {
        sessionStorage.setItem('ds_auth', '1');
        window.location.href = './index.html';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
    if (sessionStorage.getItem('ds_auth') === '1') {
      window.location.href = './index.html';
    }
  </script>
